<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="smoke">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="4" seed="1" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="30" />
    </filter>
    <style>
      @keyframes smoke-float {
        0% { transform: translate(0,0); opacity: 0.3; }
        50% { transform: translate(20px, -10px); opacity: 0.5; }
        100% { transform: translate(0,0); opacity: 0.3; }
      }
      .smoke-cloud { animation: smoke-float 10s infinite ease-in-out; }
    </style>
  </defs>
  <rect width="800" height="200" fill="#050505" />
  
  <g filter="url(#smoke)" class="smoke-cloud">
    <ellipse cx="200" cy="100" rx="150" ry="80" fill="#333" />
    <ellipse cx="600" cy="120" rx="180" ry="60" fill="#222" />
    <ellipse cx="400" cy="80" rx="120" ry="100" fill="#444" />
  </g>
  
  <text x="400" y="110" text-anchor="middle" font-family="'Georgia', serif" font-size="72" font-weight="bold" fill="#ffffff" opacity="0.9">RITIK</text>
  <text x="400" y="150" text-anchor="middle" font-family="monospace" font-size="12" fill="#666" letter-spacing="6">EMERGING FROM THE UNKNOWN</text>
</svg>
