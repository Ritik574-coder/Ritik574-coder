<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="200" fill="#fcfbf7" />
  <circle cx="650" cy="80" r="50" fill="#e11d48" opacity="0.1" />
  
  <!-- Name in Vertical Style -->
  <g transform="translate(100, 40)">
    <text x="0" y="30" font-family="'Palatino', serif" font-size="40" font-weight="bold" fill="#1c1917">R</text>
    <text x="0" y="70" font-family="'Palatino', serif" font-size="40" font-weight="bold" fill="#1c1917">I</text>
    <text x="0" y="110" font-family="'Palatino', serif" font-size="40" font-weight="bold" fill="#1c1917">T</text>
    <text x="0" y="150" font-family="'Palatino', serif" font-size="40" font-weight="bold" fill="#1c1917">I</text>
    <text x="0" y="190" font-family="'Palatino', serif" font-size="40" font-weight="bold" fill="#1c1917">K</text>
  </g>

  <!-- Professional Info -->
  <g transform="translate(180, 80)">
