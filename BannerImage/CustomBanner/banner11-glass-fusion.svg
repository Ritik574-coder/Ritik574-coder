<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Mesh Gradient -->
    <radialGradient id="grad1" cx="20%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    <radialGradient id="grad2" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="grad3" cx="50%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>

    <!-- Glass Effect Filter -->
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" />
    </filter>
    
    <!-- Floating Animation -->
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-10px) rotate(5deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }
      .floating { animation: float 6s ease-in-out infinite; }
      .pulsing { animation: pulse 4s ease-in-out infinite; }
      .glass-card { fill: rgba(255, 255, 255, 0.05); stroke: rgba(255, 255, 255, 0.1); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#grad1)" />
  <rect width="800" height="200" fill="url(#grad2)" />
  <rect width="800" height="200" fill="url(#grad3)" />

  <!-- Decorative Floating Elements -->
  <circle cx="100" cy="50" r="40" fill="#3b82f6" opacity="0.1" class="floating" />
  <circle cx="700" cy="150" r="60" fill="#8b5cf6" opacity="0.1" class="floating" style="animation-delay: -3s;" />
  <rect x="350" y="20" width="30" height="30" rx="8" fill="#10b981" opacity="0.1" class="floating" style="animation-delay: -1.5s;" />

  <!-- Glass Card (Left Side) -->
  <rect x="40" y="40" width="280" height="120" rx="20" class="glass-card" />
  <text x="180" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#ffffff" style="letter-spacing: 2px;">RITIK</text>
  
  <!-- Divider -->
  <line x1="360" y1="60" x2="360" y2="140" stroke="white" opacity="0.2" stroke-width="2" />

  <!-- Info (Right Side) -->
  <g transform="translate(400, 75)">
    <text y="0" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#3b82f6">Data Engineer</text>
    <text y="35" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#94a3b8">AI &amp; ML SPECIALIST</text>
    <text y="65" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#10b981">ENTREPRENEURSHIP STUDENT</text>
  </g>

  <!-- Bottom Accent -->
  <rect x="400" y="150" width="360" height="2" rx="1" fill="#3b82f6" opacity="0.5" />
  <text x="400" y="172" font-family="monospace" font-size="10" fill="#475569" letter-spacing="1">INNOVATING AT THE INTERSECTION OF TECH &amp; BUSINESS</text>

  <!-- Sparkles -->
  <circle cx="750" cy="30" r="2" fill="white" class="pulsing" />
  <circle cx="30" cy="180" r="1.5" fill="white" class="pulsing" style="animation-delay: 1s;" />
  <circle cx="780" cy="100" r="1" fill="white" class="pulsing" style="animation-delay: 2s;" />
</svg>
